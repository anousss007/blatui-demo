# BlatUI demo — nginx server block
# Copy to /etc/nginx/sites-available/blatui-demo and symlink into sites-enabled.
# Replace SERVER_NAME and the php-fpm socket/version to match your VPS.

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME;            # e.g. demo.blatui.dev

    root /var/www/blatui-demo/public;   # Laravel public/ dir
    index index.php;

    charset utf-8;

    # Long cache for built assets (hashed filenames from Vite).
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Adjust to your installed PHP-FPM version/socket:
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /index.php;
    client_max_body_size 20M;
}

# After issuing TLS with certbot:
#   sudo certbot --nginx -d demo.blatui.dev
# certbot rewrites this block to listen on 443 and redirect 80 → 443.
